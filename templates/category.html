<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category_name }} News</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .container { display: flex; max-width: 1400px; margin: auto; gap: 20px; }
        .main-content { flex: 1; padding: 20px; }
        .side-ad { width: 160px; min-width: 160px; background: #eee; height: 600px; }
        @media (max-width: 1100px) { .side-ad { display: none; } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="side-ad"></aside>

        <div class="main-content">
            <a href="/">← Home</a>
            <h1>{{ category_name }} News</h1>
            <div style="width:100%; height:90px; background:#ddd; margin-bottom:20px; text-align:center; line-height:90px;">BANNER AD</div>
            
            <div class="grid">
                {% for item in news %}
                <div style="border:1px solid #ddd; border-radius:10px; overflow:hidden;">
                    <img src="{{ item.image }}" style="width:100%; height:180px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/300x200';">
                    <div style="padding:15px;">
                        <h3>{{ item.title }}</h3>
                        <p style="font-size:14px; color:#666;">{{ item.description[:100] }}...</p>
                        <a href="{{ item.url }}" target="_blank" style="color:red; font-weight:bold;">Source</a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <aside class="side-ad"></aside>
    </div>
</body>
</html>
