<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category_name }} News</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { margin: 0; font-family: Arial; }
        .page-wrapper { display: flex; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; }
        .main-content { flex: 1; }
        .side-ad { width: 160px; min-width: 160px; height: 600px; background: #eee; position: sticky; top: 20px; display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .news-card { border: 1px solid #ddd; border-radius: 5px; overflow: hidden; }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        @media (max-width: 1100px) { .side-ad { display: none; } }
    </style>
</head>
<body>

<div class="page-wrapper">
    <aside class="side-ad">ADVERTISEMENT</aside>

    <main class="main-content">
        <a href="/" style="text-decoration:none; color:red; font-weight:bold;">← BACK TO HOME</a>
        <h1 style="border-bottom: 2px solid red; padding-bottom:10px;">{{ category_name }} News</h1>
        
        <div style="width:100%; height:90px; background:#f9f9f9; border:1px solid #ddd; margin-bottom:30px; text-align:center; line-height:90px; color:#999;">TOP BANNER AD</div>

        <div class="news-grid">
            {% for item in news %}
            <div class="news-card">
                <img src="{{ item.image }}" onerror="this.src='https://via.placeholder.com/300x200';">
                <div style="padding:15px;">
                    <h3 style="margin-top:0; font-size:18px;">{{ item.title }}</h3>
                    <p style="font-size:14px; color:#555;">{{ item.description[:120] }}...</p>
                    <a href="{{ item.url }}" target="_blank" style="color:red; font-weight:bold; text-decoration:none;">Full Story →</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <aside class="side-ad">ADVERTISEMENT</aside>
</div>

</body>
</html>
