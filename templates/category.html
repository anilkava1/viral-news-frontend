<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category_name }} - Viral News India</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .main-layout { display: flex; max-width: 1400px; margin: 20px auto; gap: 20px; }
        .sidebar-ad { width: 160px; min-width: 160px; background: #f4f4f4; padding: 10px; height: 600px; }
        .category-content { flex: 1; padding: 0 15px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .ad-banner { width: 100%; height: 90px; background: #eee; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; color: #999; }
        @media (max-width: 1000px) { .sidebar-ad { display: none; } }
    </style>
</head>
<body>

<div class="main-layout">
    <aside class="sidebar-ad">
        <p style="text-align:center; font-size:12px;">ADVERTISEMENT</p>
        <div style="height:100%; background:#ddd;"></div>
    </aside>

    <div class="category-content">
        <a href="/" style="color: #e74c3c; text-decoration: none;">← Back to Home</a>
        <h1>{{ category_name }} News</h1>
        
        <div class="ad-banner">Horizontal Banner Ad (728x90)</div>

        {% if news %}
        <div class="news-grid">
            {% for item in news %}
            <div class="card">
                <img src="{{ item.image }}" alt="" onerror="this.src='https://via.placeholder.com/300x200';">
                <div style="padding:15px;">
                    <h3>{{ item.title }}</h3>
                    <p>{{ item.description[:100] }}...</p>
                    <a href="{{ item.url }}" target="_blank" style="color:#e74c3c; font-weight:bold;">Read Full Story</a>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p>No news available. Please <a href="/update-now">Refresh</a>.</p>
        {% endif %}
    </div>

    <aside class="sidebar-ad">
        <p style="text-align:center; font-size:12px;">ADVERTISEMENT</p>
        <div style="height:100%; background:#ddd;"></div>
    </aside>
</div>

</body>
</html>
