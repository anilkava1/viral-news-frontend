<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category_name }} News - Viral News India</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
        
        /* 1. Page wrapper like home */
        .page-wrapper { display: flex; max-width: 1400px; margin: 0 auto; gap: 20px; padding: 20px; box-sizing: border-box; }
        .main-content { flex: 1; min-width: 0; }
        
        /* 2. Side Ads */
        .side-ad { width: 160px; min-width: 160px; height: 600px; background: #eee; border: 1px dashed #bbb; position: sticky; top: 20px; display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; color: #999; }
        
        /* 3. Category News Grid */
        .category-title { border-bottom: 2px solid #e74c3c; padding-bottom: 10px; text-transform: uppercase; color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .news-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; transition: 0.3s; }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-body h3 { font-size: 18px; margin: 0 0 10px; color: #222; }
        .card-body a { color: #e74c3c; text-decoration: none; font-weight: bold; font-size: 14px; }
        
        /* 4. Horizontal Ads */
        .ad-banner { width: 100%; height: 90px; background: #eee; border: 1px solid #ddd; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; color: #999; }

        @media (max-width: 1100px) { .side-ad { display: none; } }
    </style>
</head>
<body>

<div class="page-wrapper">
    <aside class="side-ad">
        <script>
            atOptions = {
                'key' : '6bf2c541d0a8757fac3f49bc792799bb',
                'format' : 'iframe',
                'height' : 600,
                'width' : 160,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/6bf2c541d0a8757fac3f49bc792799bb/invoke.js"></script>
</aside>

    <main class="main-content">
        <a href="/" style="text-decoration:none; color:#e74c3c; font-weight:bold; font-size:14px; display:inline-block; margin-bottom:15px;">← BACK TO HOME</a>
        
        <h1 class="category-title">{{ category_name }} News</h1>
        
        <div class="ad-banner">
            <script>
                atOptions = {
                    'key' : '5555d430c83b3316a168628eea529e0c',
                    'format' : 'iframe',
                    'height' : 90,
                    'width' : 728,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/5555d430c83b3316a168628eea529e0c/invoke.js"></script>
        </div>

        {% if news %}
        <div class="news-grid">
            {% for item in news %}
            <div class="news-card">
                <img src="{{ item.image }}" onerror="this.src='https://via.placeholder.com/300x200?text=Category+Update';">
                <div class="card-body">
                    <h3>{{ item.title }}</h3>
                    <p style="font-size:14px; color:#666; margin-bottom:15px;">{{ item.description[:130] }}...</p>
                    <a href="{{ item.url }}" target="_blank">READ FULL STORY →</a>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p style="text-align:center;">Abhi is category mein koi news nahi hai. Kripya <a href="/update-now" style="color:red; font-weight:bold;">Yahan Click Karke</a> news refresh karein.</p>
        {% endif %}
    </main>

    <aside class="side-ad">
        <script>
            atOptions = {
                'key' : '6bf2c541d0a8757fac3f49bc792799bb',
                'format' : 'iframe',
                'height' : 600,
                'width' : 160,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/6bf2c541d0a8757fac3f49bc792799bb/invoke.js"></script>
</aside>
</div>

</body>
</html>
